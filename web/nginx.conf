server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 1.1.1.1 8.8.8.8 valid=300s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' https://projekt2026.fly.dev;";

    location /nominatim/ {
        set $nominatim_upstream nominatim.openstreetmap.org;
        proxy_pass https://$nominatim_upstream/;
        proxy_ssl_server_name on;
        proxy_set_header Host $nominatim_upstream;
        proxy_set_header User-Agent "Sirena-Projekt2026/1.0 (student project; valeri@student.um.si)";
    }

    location /osrm/ {
        set $osrm_upstream router.project-osrm.org;
        proxy_pass https://$osrm_upstream/;
        proxy_ssl_server_name on;
        proxy_set_header Host $osrm_upstream;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}