app = 'projekt2026'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[deploy]
  release_command = "npm run migrate"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1